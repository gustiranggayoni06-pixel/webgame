<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranzz Store — Premium Gaming Station</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        body { background-color: #080c14; color: #f8fafc; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="antialiased min-h-screen pb-20">

    <!-- ========================================== -->
    <!-- WADAH UTAMA WEBSITE (KATALOG & HEADER)     -->
    <!-- ========================================== -->
    <div class="max-w-md mx-auto bg-[#0d1527] min-h-screen border-x border-slate-900 shadow-2xl relative flex flex-col">
        
        <!-- HEADER -->
        <header class="sticky top-0 bg-[#0d1527]/95 backdrop-blur-md border-b border-slate-800 p-4 z-30">
            <h1 class="font-extrabold text-white text-center tracking-widest">RANZZ STORE</h1>
        </header>

        <!-- KONTEN -->
        <main class="p-4 space-y-6">
            
            <!-- Pencarian & Urutkan -->
            <div class="flex gap-2">
                <input type="text" id="search-input" oninput="jalankanFilter()" placeholder="Cari nama akun..." class="w-full p-3 bg-slate-900 rounded-xl text-white text-xs border border-slate-800 focus:outline-none focus:border-indigo-500">
                <select id="sort-select" onchange="jalankanFilter()" class="p-3 bg-slate-900 rounded-xl text-white text-xs border border-slate-800 focus:outline-none focus:border-indigo-500">
                    <option value="terbaru">Terbaru</option>
                    <option value="murah">Termurah</option>
                    <option value="mahal">Termahal</option>
                </select>
            </div>

            <!-- Kategori Game -->
            <div id="kategori-container" class="flex gap-2 overflow-x-auto scrollbar-hide pb-2"></div>

            <!-- Area Grid Produk -->
            <div>
                <div id="loading-spinner" class="text-center py-10 text-slate-500 text-xs animate-pulse">Menghubungkan ke server...</div>
                <div id="katalog-grid" class="grid grid-cols-2 gap-3 hidden"></div>
                <div id="katalog-kosong" class="hidden text-center text-slate-500 text-xs py-10">Produk tidak ditemukan.</div>
            </div>

            <!-- Area Lacak Pesanan -->
            <div class="bg-slate-900/60 p-4 rounded-xl border border-slate-800 mt-6">
                <h3 class="font-bold text-white mb-3 text-[10px] uppercase tracking-widest">Lacak Pesanan</h3>
                <div class="flex gap-2 mb-2">
                    <input type="text" id="order-id-track" placeholder="Masukkan ID Pesanan" class="w-full p-3 bg-slate-950 rounded-lg text-white text-xs border border-slate-800 focus:outline-none">
                    <button onclick="lacakPesanan()" class="bg-indigo-600 px-4 rounded-lg text-white font-bold text-xs hover:bg-indigo-500">Cari</button>
                </div>
                <div id="hasil-lacak" class="hidden text-xs bg-slate-950 p-3 rounded-lg border border-slate-800 mt-2"></div>
            </div>

            <!-- Area Ulasan -->
            <div class="mt-6">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="font-bold text-white text-[10px] uppercase tracking-widest">Ulasan Pembeli</h3>
                    <button onclick="toggleFormUlasan()" class="text-[9px] bg-slate-800 px-2 py-1 rounded text-cyan-400 hover:bg-slate-700">Tulis Ulasan</button>
                </div>
                
                <div id="form-ulasan-container" class="hidden bg-slate-900/80 p-4 rounded-xl border border-slate-800 mb-4 space-y-3">
                    <input type="text" id="rev-nama" placeholder="Nama Anda" class="w-full p-3 bg-slate-950 rounded-lg text-white text-xs border border-slate-800 focus:outline-none">
                    <select id="rev-bintang" class="w-full p-3 bg-slate-950 rounded-lg text-white text-xs border border-slate-800 focus:outline-none">
                        <option value="5">⭐⭐⭐⭐⭐ (Sangat Puas)</option>
                        <option value="4">⭐⭐⭐⭐ (Puas)</option>
                        <option value="3">⭐⭐⭐ (Cukup)</option>
                    </select>
                    <textarea id="rev-pesan" placeholder="Komentar Anda..." rows="2" class="w-full p-3 bg-slate-950 rounded-lg text-white text-xs border border-slate-800 focus:outline-none"></textarea>
                    <button onclick="kirimUlasan()" class="w-full bg-emerald-500 hover:bg-emerald-400 py-3 rounded-lg text-slate-950 font-bold text-xs">Kirim</button>
                </div>

                <div id="ulasan-list" class="space-y-3"></div>
            </div>

        </main>
    </div>

    <!-- ========================================== -->
    <!-- DETAIL & CHECKOUT DRAWER (MODAL)           -->
    <!-- ========================================== -->
    <div id="checkout-drawer" class="fixed inset-0 bg-black/80 z-50 flex items-end justify-center hidden opacity-0 transition-opacity duration-300">
        <div class="w-full max-w-md bg-[#0d1527] rounded-t-2xl border-t border-slate-800 p-6 transform translate-y-full transition-transform duration-300 shadow-2xl overflow-y-auto max-h-[90vh]">
            
            <div class="flex justify-between items-center mb-4">
                <span class="text-[9px] text-cyan-400 font-extrabold uppercase tracking-widest">Detail Produk</span>
                <button onclick="tutupDrawer()" class="p-1.5 bg-slate-900 rounded-lg text-slate-400 hover:text-white">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>

            <div class="relative w-full mb-4">
                <div class="relative h-48 w-full bg-slate-950 rounded-xl overflow-hidden border border-slate-800 flex items-center justify-center">
                    <button id="btn-prev-foto" onclick="geserFoto(-1)" class="absolute left-2 p-2 bg-black/50 text-white rounded-full hidden z-10">&#10094;</button>
                    <img id="d-gambar-utama" src="" class="w-full h-full object-cover">
                    <button id="btn-next-foto" onclick="geserFoto(1)" class="absolute right-2 p-2 bg-black/50 text-white rounded-full hidden z-10">&#10095;</button>
                </div>
                <div id="d-thumbnail-container" class="flex gap-2 mt-2 overflow-x-auto scrollbar-hide hidden"></div>
            </div>

            <div class="flex flex-col mb-4">
                <h4 id="d-nama" class="font-bold text-sm text-white">Nama Akun</h4>
                <p id="d-spek" class="text-[10px] text-slate-400 mt-0.5">Spesifikasi Utama</p>
                <span id="d-harga" class="text-sm font-extrabold text-cyan-400 mt-1">Rp 0</span>
            </div>

            <!-- Elemen Info Tambahan (Wajib ada agar JS tidak Error) -->
            <div class="grid grid-cols-2 gap-2 text-[10px] text-slate-400 mb-5">
                <div class="bg-slate-900 p-2 rounded-lg border border-slate-800 flex justify-between"><span>Nick:</span> <span id="d-nick" class="font-bold text-white"></span></div>
                <div class="bg-slate-900 p-2 rounded-lg border border-slate-800 flex justify-between"><span>Skin:</span> <span id="d-skin" class="font-bold text-white"></span></div>
                <div class="bg-slate-900 p-2 rounded-lg border border-slate-800 flex justify-between"><span>Login:</span> <span id="d-login" class="font-bold text-white"></span></div>
                <div class="bg-slate-900 p-2 rounded-lg border border-slate-800 flex justify-between"><span>WR:</span> <span id="d-wr" class="font-bold text-white"></span></div>
            </div>

            <div class="mb-5">
                <label class="block text-[10px] font-bold text-slate-400 mb-1.5 uppercase">Nomor WhatsApp Aktif:</label>
                <input type="number" id="buyer-phone" placeholder="Contoh: 08123456789" class="w-full bg-slate-900 text-slate-100 text-xs px-3.5 py-3.5 rounded-xl border border-slate-800 focus:outline-none focus:border-indigo-500">
            </div>

            <div class="mb-5">
                <h4 class="text-[10px] font-bold text-slate-400 mb-2 uppercase">Pilih Metode Pembayaran:</h4>
                <div class="space-y-2">
                    <label id="label-qris" onclick="pilihMetode('qris')" class="flex items-center p-3 bg-slate-900 rounded-xl border border-indigo-500 cursor-pointer transition-all">
                        <input type="radio" name="payment" value="qris" checked class="hidden">
                        <span class="ml-3 text-xs text-white font-bold">QRIS (Otomatis via Pakasir)</span>
                    </label>
                    <label id="label-dana" onclick="pilihMetode('dana')" class="flex items-center p-3 bg-slate-900 rounded-xl border border-slate-800 cursor-pointer transition-all">
                        <input type="radio" name="payment" value="dana" class="hidden">
                        <span class="ml-3 text-xs text-white font-bold">DANA (Manual via WA)</span>
                    </label>
                    <label id="label-gopay" onclick="pilihMetode('gopay')" class="flex items-center p-3 bg-slate-900 rounded-xl border border-slate-800 cursor-pointer transition-all">
                        <input type="radio" name="payment" value="gopay" class="hidden">
                        <span class="ml-3 text-xs text-white font-bold">GoPay (Manual via WA)</span>
                    </label>
                </div>
            </div>

            <div class="mt-2 pb-6">
                <button onclick="prosesCheckout()" class="w-full bg-gradient-to-r from-indigo-500 to-cyan-500 hover:brightness-110 text-slate-950 font-extrabold text-xs py-4 rounded-xl transition shadow-lg shadow-indigo-500/10">
                    BAYAR SEKARANG
                </button>
            </div>
            
        </div> 
    </div>

    <!-- ========================================== -->
    <!-- ENGINE JAVASCRIPT & SUPABASE               -->
    <!-- ========================================== -->
    <script>
        const SUPABASE_URL = 'https://edhonplddyebaeejwaco.supabase.co'; 
        const SUPABASE_ANON_KEY = 'sb_publishable_sY9PVeH2lMnM47f9AUvgAA_roqfEeHv';
        const GATEWAY_SLUG = 'depodomain'; 
        const WA_ADMIN_TAMPILAN = '6283157363740'; 

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let database = [];
        let ulasanDb = [];
        let kategoriTerpilih = 'Semua';
        let queryCari = '';
        let currentItem = null;
        let semuaFotoDrawer = [];
        let fotoAktifIndex = 0;

        function dapatkanGambarUtama(gambarStr) {
            try {
                const parsed = JSON.parse(gambarStr);
                if (Array.isArray(parsed) && parsed.length > 0) return parsed[0];
                return gambarStr;
            } catch (e) { return gambarStr; }
        }

        function dapatkanSemuaGambar(gambarStr) {
            try {
                const parsed = JSON.parse(gambarStr);
                if (Array.isArray(parsed)) return parsed;
                return [gambarStr];
            } catch (e) { return [gambarStr]; }
        }

        async function fetchProducts() {
            try {
                const { data, error } = await supabaseClient.from('products').select('*');
                if (error) throw error;
                database = data;
                document.getElementById('loading-spinner').classList.add('hidden');
                document.getElementById('katalog-grid').classList.remove('hidden');
                renderKategori();
                jalankanFilter();
            } catch (err) {
                console.error("Error:", err.message);
                document.getElementById('loading-spinner').innerText = "Gagal memuat produk dari database.";
            }
        }

        async function fetchReviews() {
            try {
                const { data, error } = await supabaseClient.from('reviews').select('*').order('created_at', { ascending: false });
                if (error) throw error;
                ulasanDb = data;
                renderUlasan();
            } catch (err) { console.error("Error ulasan:", err.message); }
        }

        function renderKategori() {
            const listGame = ['Semua', ...new Set(database.map(p => p.game))];
            const container = document.getElementById('kategori-container');
            container.innerHTML = '';
            listGame.forEach(game => {
                const aktif = game === kategoriTerpilih;
                const btn = document.createElement('button');
                btn.className = `px-3.5 py-1.5 rounded-lg border text-[10px] font-extrabold whitespace-nowrap transition ${
                    aktif ? 'bg-indigo-500/10 border-indigo-500 text-indigo-400' : 'bg-slate-900 border-slate-800 text-slate-400 hover:text-white'
                }`;
                btn.innerText = game;
                btn.onclick = () => { kategoriTerpilih = game; renderKategori(); jalankanFilter(); };
                container.appendChild(btn);
            });
        }

        function jalankanFilter() {
            const container = document.getElementById('katalog-grid');
            const emptyEl = document.getElementById('katalog-kosong');
            container.innerHTML = '';
            queryCari = document.getElementById('search-input').value.toLowerCase();
            const sortVal = document.getElementById('sort-select').value;

            let terfilter = database.filter(p => {
                const cocokKat = kategoriTerpilih === 'Semua' || p.game === kategoriTerpilih;
                const cocokSearch = p.nama.toLowerCase().includes(queryCari) || p.spek.toLowerCase().includes(queryCari);
                return cocokKat && cocokSearch;
            });

            if (sortVal === 'murah') terfilter.sort((a, b) => a.harga - b.harga);
            else if (sortVal === 'mahal') terfilter.sort((a, b) => b.harga - a.harga);
            else terfilter.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

            if (terfilter.length === 0) {
                emptyEl.classList.remove('hidden');
                container.classList.add('hidden');
                return;
            } else {
                emptyEl.classList.add('hidden');
                container.classList.remove('hidden');
            }

            terfilter.forEach(p => {
                const card = document.createElement('div');
                card.className = "bg-slate-900/60 border border-slate-800/80 rounded-2xl overflow-hidden cursor-pointer hover:border-indigo-500 transition-all flex flex-col justify-between";
                card.onclick = () => bukaDrawer(p);

                const statusBadgeColor = p.status === 'Ready' ? 'bg-emerald-500/10 text-emerald-400 border-emerald-500/20' : 'bg-red-500/10 text-red-400 border-red-500/20';

                card.innerHTML = `
                    <div class="relative h-28 bg-slate-950 overflow-hidden">
                        <img src="${dapatkanGambarUtama(p.gambar)}" class="w-full h-full object-cover">
                        <div class="absolute top-2 left-2 border ${statusBadgeColor} text-[7px] font-bold px-1.5 py-0.5 rounded tracking-widest uppercase">
                            ${p.status}
                        </div>
                    </div>
                    <div class="p-3 flex-grow flex flex-col justify-between">
                        <div>
                            <span class="text-[8px] text-indigo-400 font-extrabold uppercase tracking-wider">${p.game}</span>
                            <h4 class="text-[11px] font-bold text-white mt-0.5 line-clamp-1">${p.nama}</h4>
                            <p class="text-[9px] text-slate-500 line-clamp-2 mt-1 leading-relaxed">${p.spek}</p>
                        </div>
                        <div class="mt-3 pt-2.5 border-t border-slate-800 flex justify-between items-center">
                            <span class="text-xs font-extrabold text-cyan-400">Rp ${parseInt(p.harga).toLocaleString('id-ID')}</span>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function updateTampilanFotoDrawer(index) {
            fotoAktifIndex = index;
            document.getElementById('d-gambar-utama').src = semuaFotoDrawer[fotoAktifIndex];
            const currentThumbs = document.getElementById('d-thumbnail-container').querySelectorAll('img');
            currentThumbs.forEach((t, idx) => {
                if (idx === fotoAktifIndex) {
                    t.classList.replace('border-slate-800', 'border-indigo-500'); t.classList.add('scale-105');
                } else {
                    t.classList.replace('border-indigo-500', 'border-slate-800'); t.classList.remove('scale-105');
                }
            });
        }

        function geserFoto(arah) {
            if (semuaFotoDrawer.length <= 1) return;
            let newIndex = fotoAktifIndex + arah;
            if (newIndex < 0) newIndex = semuaFotoDrawer.length - 1;
            if (newIndex >= semuaFotoDrawer.length) newIndex = 0;
            updateTampilanFotoDrawer(newIndex);
        }

        function bukaDrawer(produk) {
            currentItem = produk;
            semuaFotoDrawer = dapatkanSemuaGambar(produk.gambar);
            fotoAktifIndex = 0;
            
            document.getElementById('d-gambar-utama').src = semuaFotoDrawer[0];
            const btnPrev = document.getElementById('btn-prev-foto');
            const btnNext = document.getElementById('btn-next-foto');
            const thumbContainer = document.getElementById('d-thumbnail-container');
            thumbContainer.innerHTML = '';
            
            if(semuaFotoDrawer.length > 1) {
                btnPrev.classList.remove('hidden'); btnNext.classList.remove('hidden'); thumbContainer.classList.remove('hidden');
                semuaFotoDrawer.forEach((foto, index) => {
                    const thumb = document.createElement('img');
                    thumb.src = foto;
                    thumb.className = `w-12 h-12 object-cover rounded-lg border cursor-pointer shrink-0 transition-all ${index === 0 ? 'border-indigo-500 scale-105' : 'border-slate-800'}`;
                    thumb.onclick = () => updateTampilanFotoDrawer(index);
                    thumbContainer.appendChild(thumb);
                });
            } else {
                btnPrev.classList.add('hidden'); btnNext.classList.add('hidden'); thumbContainer.classList.add('hidden');
            }

            document.getElementById('d-nama').innerText = produk.nama;
            document.getElementById('d-spek').innerText = produk.spek;
            document.getElementById('d-harga').innerText = `Rp ${parseInt(produk.harga).toLocaleString('id-ID')}`;
            document.getElementById('d-nick').innerText = produk.nick || '-';
            document.getElementById('d-skin').innerText = produk.skin || '-';
            document.getElementById('d-login').innerText = produk.login || '-';
            document.getElementById('d-wr').innerText = produk.wr || '-';

            const drawer = document.getElementById('checkout-drawer');
            drawer.classList.remove('hidden');
            setTimeout(() => {
                drawer.classList.remove('opacity-0');
                drawer.querySelector('.transform').classList.remove('translate-y-full');
            }, 10);
        }

        function tutupDrawer() {
            const drawer = document.getElementById('checkout-drawer');
            drawer.classList.add('opacity-0');
            drawer.querySelector('.transform').classList.add('translate-y-full');
            setTimeout(() => { drawer.classList.add('hidden'); currentItem = null; }, 300);
        }

        async function prosesCheckout() {
            const waBuyer = document.getElementById('buyer-phone').value.trim();
            const radioMetode = document.querySelector('input[name="payment"]:checked');
            
            if (!radioMetode) { alert('Silakan pilih metode pembayaran terlebih dahulu!'); return; }
            const metode = radioMetode.value;
            if (!waBuyer) { alert('Silakan isi nomor WhatsApp Anda!'); return; }

            const d = new Date();
            const orderId = `RNZ-${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}-${Math.floor(1000 + Math.random() * 9000)}`;

            let textWA = `*KLAIM PESANAN ${metode.toUpperCase()}*\n\n` +
                         `Halo Admin Ranzz Store, saya melakukan pembayaran via ${metode.toUpperCase()}.\n\n` +
                         `📦 *Akun:* ${currentItem.nama}\n` +
                         `🔖 *ID:* ${orderId}\n` +
                         `📞 *WA:* ${waBuyer}\n\n` +
                         `Mohon diproses min!`;

            try {
                await supabaseClient.from('orders').insert([{
                    order_id: orderId,
                    nama_akun: currentItem.nama,
                    harga: currentItem.harga,
                    status: 'Menunggu Verifikasi Pembayaran (' + metode.toUpperCase() + ')',
                    wa_pembeli: waBuyer
                }]);

                if (metode === 'qris') {
                    // LOGIKA PAKASIR
                    const gatewayDomain = ['p','a','k','a','s','i','r'].join('');
                    window.location.href = `https://app.${gatewayDomain}.com/pay/${GATEWAY_SLUG}/${currentItem.harga}?order_id=${orderId}&qris_only=1&redirect=${encodeURIComponent('https://wa.me/' + WA_ADMIN_TAMPILAN + '?text=' + encodeURIComponent(textWA))}`;
                } else {
                    // LOGIKA E-WALLET DANA & GOPAY -> LANGSUNG KE WA ADMIN 083157363740
                    window.location.href = `https://wa.me/${WA_ADMIN_TAMPILAN}?text=${encodeURIComponent(textWA)}`;
                }
            } catch (err) {
                alert('Database error: ' + err.message);
            }
        }
      
        async function lacakPesanan() {
            const idInput = document.getElementById('order-id-track').value.trim();
            const output = document.getElementById('hasil-lacak');
            if (!idInput) { alert('Tolong isi ID Transaksi terlebih dahulu!'); return; }

            output.classList.remove('hidden');
            output.innerHTML = `<p class="text-center text-slate-500 animate-pulse py-2">Mencari pesanan...</p>`;

            try {
                const { data, error } = await supabaseClient.from('orders').select('*').eq('order_id', idInput).single();
                if (error) throw error;
                if (data) {
                    const formattedDate = new Date(data.created_at).toLocaleDateString('id-ID', {day: 'numeric', month: 'short', year: 'numeric'});
                    output.innerHTML = `
                        <div class="space-y-1.5">
                            <p class="font-bold text-white border-b border-slate-800 pb-1.5">📦 ${data.nama_akun}</p>
                            <p class="flex justify-between"><span>Harga:</span> <span class="font-bold text-cyan-400">Rp ${parseInt(data.harga).toLocaleString('id-ID')}</span></p>
                            <p class="flex justify-between"><span>Status:</span> <span class="text-amber-400 font-bold">${data.status}</span></p>
                            <p class="flex justify-between text-[10px] text-slate-500"><span>Tanggal:</span> <span>${formattedDate}</span></p>
                        </div>
                    `;
                }
            } catch (err) {
                output.innerHTML = `<span class="text-red-400">ID Pesanan tidak ditemukan.</span>`;
            }
        }

        function toggleFormUlasan() {
            document.getElementById('form-ulasan-container').classList.toggle('hidden');
        }

        function renderUlasan() {
            const container = document.getElementById('ulasan-list');
            container.innerHTML = '';
            ulasanDb.forEach(r => {
                const card = document.createElement('div');
                card.className = "bg-slate-900/40 border border-slate-800/60 p-3 rounded-xl text-xs space-y-1";
                card.innerHTML = `
                    <div class="flex justify-between items-center"><span class="font-bold text-white">${r.nama}</span><span class="text-amber-400">★ ${r.bintang}.0</span></div>
                    <p class="text-slate-400 text-[11px] leading-relaxed">${r.pesan}</p>
                `;
                container.appendChild(card);
            });
        }

        async function kirimUlasan() {
            const nama = document.getElementById('rev-nama').value.trim();
            const bintang = parseInt(document.getElementById('rev-bintang').value);
            const pesan = document.getElementById('rev-pesan').value.trim();
            if (!nama || !pesan) { alert('Tolong lengkapi nama dan komentar ulasan!'); return; }
            try {
                const { error } = await supabaseClient.from('reviews').insert([{ nama, bintang, pesan }]);
                if (error) throw error;
                document.getElementById('rev-nama').value = ''; document.getElementById('rev-pesan').value = '';
                toggleFormUlasan(); fetchReviews();
            } catch (err) { alert('Gagal mengirim ulasan: ' + err.message); }
        }

        window.onload = () => { fetchProducts(); fetchReviews(); }

        function pilihMetode(metode) {
            const labels = ['label-qris', 'label-dana', 'label-gopay'];
