<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranzz Store — Admin Control Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: { fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] } }
            }
        }
    </script>
    <style>body { background-color: #040814; color: #f8fafc; }</style>
</head>
<body class="antialiased min-h-screen">

    <div class="flex flex-col md:flex-row min-h-screen">
        
        <!-- SIDEBAR -->
        <div class="w-full md:w-64 bg-[#0d1527] border-b md:border-b-0 md:border-r border-slate-800 p-6 flex flex-col justify-between">
            <div>
                <h2 class="font-black text-xl text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-cyan-400 tracking-wider">RNZ CONTROL</h2>
                <p class="text-[10px] text-slate-500 uppercase mt-1">Console Cloud V3.0</p>
                <nav class="mt-8 space-y-2">
                    <a href="#produk-section" class="block px-4 py-2.5 bg-indigo-600/10 border border-indigo-500/30 text-indigo-400 rounded-xl font-bold text-xs">📦 Manajemen Akun</a>
                    <a href="#order-section" class="block px-4 py-2.5 bg-slate-900 border border-slate-800/80 text-slate-400 rounded-xl font-bold text-xs hover:border-slate-700 transition">💵 Transaksi Masuk</a>
                    <a href="https://whatsapp.com/channel/0029Vb6aiqD84OmJxmCm4z0j" target="_blank" class="block px-4 py-2.5 bg-emerald-950/20 border border-emerald-800/40 text-emerald-400 rounded-xl font-bold text-xs hover:bg-emerald-500 hover:text-slate-950 transition-all mt-4">📢 Pantau Saluran WA</a>
                </nav>
            </div>
            <div class="hidden md:block pt-4 border-t border-slate-800/60 text-[10px] text-slate-600">Connected to Cloud.</div>
        </div>

        <!-- MAIN WINDOW AREA -->
        <div class="flex-grow p-6 space-y-8 overflow-y-auto max-w-6xl">
            
            <!-- SECTION 1: TAMBAH PRODUK -->
            <section id="produk-section" class="bg-[#0d1527] border border-slate-800 rounded-2xl p-6 shadow-xl">
                <h3 class="font-extrabold text-white text-sm uppercase tracking-wider mb-4 text-indigo-400">Tambah Akun Game Baru</h3>
                
                <form id="product-form" onsubmit="simpanProduk(event)" class="grid grid-cols-1 md:grid-cols-2 gap-4 text-xs">
                    <div class="space-y-3">
                        <div><label class="block text-slate-400 mb-1 font-bold">Nama Judul Akun</label><input type="text" id="p-nama" required placeholder="Contoh: FF Spek Evogun Max" class="w-full p-3 bg-slate-900 border border-slate-800 rounded-xl text-white focus:outline-none focus:border-indigo-500"></div>
                        
                        <!-- INPUT DETEKSI GAME UNTUK MERUBAH JUDUL TEKS DI SEBELAHNYA -->
                        <div><label class="block text-slate-400 mb-1 font-bold">Kategori Game (Ketik FF atau MLBB)</label><input type="text" id="p-game" required oninput="sesuaikanTeksFormAdmin(this.value)" placeholder="Contoh: FF / MLBB" class="w-full p-3 bg-slate-900 border border-slate-800 rounded-xl text-white focus:outline-none focus:border-indigo-500"></div>
                        
                        <div><label class="block text-slate-400 mb-1 font-bold">Harga Akun (Angka Saja)</label><input type="number" id="p-harga" required placeholder="Contoh: 150000" class="w-full p-3 bg-slate-900 border border-slate-800 rounded-xl text-white focus:outline-none focus:border-indigo-500"></div>
                        <div>
                            <label class="block text-slate-400 mb-1 font-bold">Upload Foto Akun (Bisa Pilih Banyak)</label>
                            <div class="relative border-2 border-dashed border-slate-800 hover:border-indigo-500 rounded-xl p-4 transition-colors bg-slate-900 flex flex-col items-center justify-center cursor-pointer">
                                <input type="file" id="p-foto-files" multiple accept="image/*" onchange="handlePreviewFoto(this)" class="absolute inset-0 opacity-0 cursor-pointer">
                                <span class="text-[11px] text-slate-400">Klik atau seret foto-foto akun ke sini</span>
                            </div>
                            <div id="preview-foto-container" class="flex gap-2 mt-3 overflow-x-auto scrollbar-hide"></div>
                        </div>
                    </div>

                    <div class="space-y-3">
                        <div class="grid grid-cols-2 gap-2">
                            <div><label id="lbl-adm-nick" class="block text-slate-400 mb-1 font-bold">Nickname</label><input type="text" id="p-nick" class="w-full p-3 bg-slate-900 border border-slate-800 rounded-xl text-white focus:outline-none"></div>
                            <div><label id="lbl-adm-skin" class="block text-slate-400 mb-1 font-bold">Skin Koleksi</label><input type="text" id="p-skin" class="w-full p-3 bg-slate-900 border border-slate-800 rounded-xl text-white focus:outline-none"></div>
                        </div>
                        <div class="grid grid-cols-2 gap-2">
                            <div><label id="lbl-adm-login" class="block text-slate-400 mb-1 font-bold">Sistem Login</label><input type="text" id="p-login" placeholder="Moonton / FB / VK" class="w-full p-3 bg-slate-900 border border-slate-800 rounded-xl text-white focus:outline-none"></div>
                            
                            <!-- BAGIAN YANG AKAN BERUBAH TEXT-NYA: JADI LEVEL / WR -->
                            <div><label id="lbl-adm-wr" class="block text-slate-400 mb-1 font-bold">Stat / Win Rate (WR)</label><input type="text" id="p-wr" placeholder="Contoh: 65% / Lvl 72" class="w-full p-3 bg-slate-900 border border-slate-800 rounded-xl text-white focus:outline-none"></div>
                        </div>
                        <div><label class="block text-slate-400 mb-1 font-bold">Deskripsi / Spesifikasi Lengkap</label><textarea id="p-spek" required rows="4" placeholder="Tulis rincian kelengkapan..." class="w-full p-3 bg-slate-900 border border-slate-800 rounded-xl text-white focus:outline-none focus:border-indigo-500"></textarea></div>
                    </div>

                    <div class="md:col-span-2 pt-2">
                        <button type="submit" id="btn-submit" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-extrabold py-3.5 rounded-xl transition shadow-lg">UPLOAD KE CLOUD STORE</button>
                    </div>
                </form>
            </section>

            <!-- SECTION 2: LIVE DATATABLE TRANSAKSI -->
            <section id="order-section" class="bg-[#0d1527] border border-slate-800 rounded-2xl p-6 shadow-xl">
                <h3 class="font-extrabold text-white text-sm uppercase tracking-wider mb-4 text-cyan-400">Daftar Transaksi Masuk</h3>
                <div class="overflow-x-auto">
                    <table class="w-full text-[11px] text-left text-slate-300">
                        <thead class="bg-slate-950 text-slate-400 uppercase text-[9px] tracking-wider border-b border-slate-800">
                            <tr>
                                <th class="p-3">ID Transaksi</th>
                                <th class="p-3">Nama Akun</th>
                                <th class="p-3">Nominal</th>
                                <th class="p-3">No. WA Pembeli</th>
                                <th class="p-3">Status Pembayaran</th>
                                <th class="p-3">Aksi Panel</th>
                            </tr>
                        </thead>
                        <tbody id="admin-orders-table">
                            <tr><td colspan="6" class="p-4 text-center text-slate-600 animate-pulse">Menghubungkan data cloud...</td></tr>
                        </tbody>
                    </table>
                </div>
            </section>

        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://edhonplddyebaeejwaco.supabase.co'; 
        const SUPABASE_ANON_KEY = 'sb_publishable_sY9PVeH2lMnM47f9AUvgAA_roqfEeHv';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // FUNGSI CANGGIH MERUBAH JUDUL INPUT FORM ADMIN BERDASARKAN HURUF YANG DIKETIK
        function sesuaikanTeksFormAdmin(nilaiInput) {
            const txt = nilaiInput.toUpperCase();
            if (txt === 'FF' || txt === 'FREE FIRE') {
                document.getElementById('lbl-adm-nick').innerText = "Nickname (FF)";
                document.getElementById('lbl-adm-skin').innerText = "Bundle & Evo Gun";
                document.getElementById('lbl-adm-wr').innerText = "Level Akun (FF)";
                document.getElementById('p-wr').placeholder = "Contoh: Lvl 68";
            } else if (txt === 'ML' || txt === 'MLBB' || txt === 'MOBILE LEGENDS') {
                document.getElementById('lbl-adm-nick').innerText = "Nickname (MLBB)";
                document.getElementById('lbl-adm-skin').innerText = "Jumlah Skin";
                document.getElementById('lbl-adm-wr').innerText = "Win Rate Akun (WR)";
                document.getElementById('p-wr').placeholder = "Contoh: 62%";
            } else {
                document.getElementById('lbl-adm-nick').innerText = "Nickname";
                document.getElementById('lbl-adm-skin').innerText = "Skin Koleksi";
                document.getElementById('lbl-adm-wr').innerText = "Stat / Win Rate (WR)";
                document.getElementById('p-wr').placeholder = "Spesifikasi data bebas";
            }
        }

        function handlePreviewFoto(input) {
            const container = document.getElementById('preview-foto-container');
            container.innerHTML = '';
            if (input.files) {
                Array.from(input.files).forEach(file => {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        const img = document.createElement('img'); img.src = e.target.result; img.className = "w-16 h-16 object-cover rounded-lg border border-slate-800 shrink-0";
                        container.appendChild(img);
                    }
                    reader.readAsDataURL(file);
                });
            }
        }

        async function simpanProduk(e) {
            e.preventDefault();
            const btnSubmit = document.getElementById('btn-submit');
            const fileInput = document.getElementById('p-foto-files');
            if (fileInput.files.length === 0) { alert('Pilih minimal 1 foto!'); return; }

            btnSubmit.disabled = true; btnSubmit.innerText = "Uploading data...";
            const nama = document.getElementById('p-nama').value;
            const game = document.getElementById('p-game').value;
            const harga = parseInt(document.getElementById('p-harga').value);
            const nick = document.getElementById('p-nick').value;
            const skin = document.getElementById('p-skin').value;
            const login = document.getElementById('p-login').value;
            const wr = document.getElementById('p-wr').value;
            const spek = document.getElementById('p-spek').value;

            let uploadedUrls = [];
            try {
                for (let i = 0; i < fileInput.files.length; i++) {
                    const file = fileInput.files[i];
                    const fileExt = file.name.split('.').pop();
                    const filePath = `${Date.now()}_${i}.${fileExt}`;
                    const { error: uploadError } = await supabaseClient.storage.from('product-images').upload(filePath, file);
                    if (uploadError) throw uploadError;
                    const { data: urlData } = supabaseClient.storage.from('product-images').getPublicUrl(filePath);
                    uploadedUrls.push(urlData.publicUrl);
                }
                const { error } = await supabaseClient.from('products').insert([{
                    nama, game, harga, gambar: JSON.stringify(uploadedUrls), nick, skin, login, wr, spek, status: 'Ready'
                }]);
                if (error) throw error;
                alert('Produk berhasil masuk ke Cloud Store!');
                document.getElementById('product-form').reset();
                document.getElementById('preview-foto-container').innerHTML = '';
            } catch (err) { alert('Gagal: ' + err.message); }
            finally { btnSubmit.disabled = false; btnSubmit.innerText = "UPLOAD KE CLOUD STORE"; }
        }

        async function fetchAdminOrders() {
            try {
                const { data, error } = await supabaseClient.from('orders').select('*').order('created_at', { ascending: false });
                if (error) throw error;
                const tbody = document.getElementById('admin-orders-table'); tbody.innerHTML = '';
                if(data.length === 0) { tbody.innerHTML = '<tr><td colspan="6" class="p-4 text-center text-slate-600">Belum ada transaksi.</td></tr>'; return; }
                data.forEach(o => {
                    const tr = document.createElement('tr'); tr.className = "border-b border-slate-900/60 hover:bg-slate-900/40 transition-colors";
                    tr.innerHTML = `
                        <td class="p-3 font-mono text-indigo-400 font-bold">${o.order_id}</td>
                        <td class="p-3 font-bold text-white">${o.nama_akun}</td>
                        <td class="p-3 text-cyan-400 font-extrabold">Rp ${parseInt(o.harga).toLocaleString('id-ID')}</td>
                        <td class="p-3 font-mono">${o.wa_pembeli}</td>
                        <td class="p-3 font-bold"><span class="px-2 py-0.5 rounded bg-slate-950 text-amber-400">${o.status}</span></td>
                        <td class="p-3 flex gap-2">
                            <button onclick="updateStatus('${o.order_id}', 'Sukses / Lunas')" class="bg-emerald-600 hover:bg-emerald-500 text-slate-950 font-black px-2 py-1 rounded transition">Lunas</button>
                            <button onclick="updateStatus('${o.order_id}', 'Gagal / Cancel')" class="bg-red-950 border border-red-800 text-red-400 px-2 py-1 rounded transition">Batal</button>
                        </td>`;
                    tbody.appendChild(tr);
                });
            } catch (err) { console.error(err); }
        }

        async function updateStatus(orderId, statusBaru) {
            try {
                const { error } = await supabaseClient.from('orders').update({ status: statusBaru }).eq('order_id', orderId);
                if (error) throw error;
                alert(`Status diperbarui!`); fetchAdminOrders();
            } catch (err) { alert(err.message); }
        }
        window.onload = () => { fetchAdminOrders(); }
    </script>
</body>
</html>
